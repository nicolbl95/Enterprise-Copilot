version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: enterprise_vector_store
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: enterprise_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  qdrant_data:
  redis_data: